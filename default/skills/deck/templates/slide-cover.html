<!-- Example slide — compose freely. Not a required pattern. -->
<!-- Typical use: deck opening. Wordmark, meeting context, title, presenter/audience. -->
<!-- If used, typically once per deck. MUST reference /assets/lerian-wordmark.svg (not .png). -->
<!-- Asset pattern: this example uses <img src="/assets/..."> (absolute path, cacheable, simple). -->
<!-- deck.html's cover slide inlines the SVG instead — both patterns are acceptable; pick one per deck. -->
<!-- Padding override (64px 100px 40px): trims the standard 48px bottom to 40px so the wordmark + title stack centers vertically on the cover. Content slides keep the standard 64px top / 48px bottom. -->
<section data-label="Cover" class="slide" style="padding: 64px 100px 40px;">
  <div class="meta">
    <div class="left">
      <span class="dot"></span>
      <span>Your footer here</span>
    </div>
    <div class="right"><span>Month DD, YYYY</span></div>
  </div>

  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding-top: 60px;">
    <div class="eyebrow" style="margin-bottom: 40px;">Session Materials &mdash; Template</div>

    <div style="display: flex; align-items: flex-end; gap: 56px;">
      <img src="/assets/lerian-wordmark.svg" alt="Lerian Studio wordmark" style="height: 220px; width: auto; display: block;" />
    </div>

    <div style="font-family: 'Poppins', sans-serif; font-weight: 500; font-size: 72px; line-height: 1.02; letter-spacing: -0.03em; margin-top: 56px; max-width: 1500px;">
      {{DECK_TITLE}}<span style="color: var(--c-ink-3);"> &mdash; your single-sentence framing goes here.</span>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; padding-top: 40px; border-top: 1px solid var(--c-rule);">
    <div>
      <div class="eyebrow" style="margin-bottom: 14px;">Prepared by</div>
      <div style="font-size: 26px; color: var(--c-ink); line-height: 1.4;">
        Presenter Name<span style="color: var(--c-ink-3);"> &middot; Role</span>
      </div>
    </div>
    <div>
      <div class="eyebrow" style="margin-bottom: 14px;">For</div>
      <div style="font-size: 26px; color: var(--c-ink); line-height: 1.4;">
        Audience or organization
      </div>
    </div>
  </div>
</section>
<!-- END example -->
